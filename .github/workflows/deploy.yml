name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.PROD_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify deployment configuration
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "Set the PRODUCTION_URL repository variable before enabling production deploys." >&2
            exit 1
          fi
      - run: npm ci
      - run: npm run check
      - name: Deploy the merged SHA to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Smoke test production readiness, collaboration, and MCP routes
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: node scripts/smoke.mjs
      - name: Rollback guidance on smoke failure
        if: failure()
        run: |
          echo "::error::Post-deploy smoke checks failed for ${{ github.sha }}." >&2
          echo "Roll back to the previous good version with the 'Rollback production' workflow" >&2
          echo "(Actions -> Rollback production -> Run workflow), or run: npm run rollback." >&2
