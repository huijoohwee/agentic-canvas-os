name: Preview deploy

# Uploads a non-production Cloudflare Worker *version* for each pull request so a
# reviewer can exercise the change on a real preview URL before it merges to
# main. A version upload does NOT shift production traffic; promotion still
# happens only through deploy.yml after merge.
#
# Gated behind the PREVIEW_DEPLOY_ENABLED repository variable and the same
# production secrets as deploy.yml, so it stays inert until explicitly enabled.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: vars.PREVIEW_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Upload a preview version to Cloudflare
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload
      - name: Comment the preview URL on the pull request
        if: steps.preview.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.preview.outputs.deployment-url }}`;
            const marker = '<!-- agentic-canvas-os-preview -->';
            const body = `${marker}\nPreview version deployed: ${url}\n\nThis is a non-production version upload; production is unchanged until merge.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
