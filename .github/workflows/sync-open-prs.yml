name: Sync open auto-merge PRs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: sync-open-automerge-prs
  cancel-in-progress: false

jobs:
  sync-oldest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Update the oldest eligible PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/sync-open-pr.mjs
