name: Sync open auto-merge PRs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: sync-open-automerge-prs
  cancel-in-progress: false

jobs:
  sync-oldest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Update the oldest eligible PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/sync-open-pr.mjs
